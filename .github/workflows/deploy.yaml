name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Fix DNS if needed
        run: |
          if ! nslookup registry-1.docker.io > /dev/null 2>&1; then
            echo "DNS issue detected, adding fallback"
            echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf > /dev/null
            echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf > /dev/null
          fi

      - name: Build image into K3s containerd
        run: |
          mkdir -p $HOME/.docker && echo '{}' > $HOME/.docker/config.json 2>/dev/null || true
          # K3s containerd 에서 직접 빌드 (로컬에 이미지 생성)
          sudo nerdctl --address /run/k3s/containerd/containerd.sock build -t trip-otobz:latest .

      - name: Rollout restart
        run: |
          kubectl --kubeconfig $HOME/.kube/config rollout restart deployment/trip-otobz -n worker
          # imagePullPolicy: IfNotPresent 이므로 로컬 이미지가 있어야 함
          kubectl --kubeconfig $HOME/.kube/config rollout status deployment/trip-otobz -n worker --timeout=120s

      - name: Verify
        run: |
          kubectl get pods -n worker -l app=trip-otobz
          echo "✅ trip-otobz deployed"
