name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build image with latest tag
        run: |
          # default namespace에서 빌드 후 k8s.io로 import
          sudo nerdctl --address /run/k3s/containerd/containerd.sock build \
            -t trip-otobz:latest \
            .
          sudo nerdctl --address /run/k3s/containerd/containerd.sock save trip-otobz:latest \
            | sudo nerdctl --address /run/k3s/containerd/containerd.sock --namespace k8s.io load

      - name: Rollout restart
        run: |
          # 이미지 태그가 변경되었으므로 rollout restart 로 새 이미지 사용
          KUBECONFIG=$HOME/.kube/config sudo kubectl set image deployment/trip-otobz trip-otobz=trip-otobz:latest -n worker
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout status deployment/trip-otobz -n worker --timeout=300s

      - name: Verify
        run: |
          KUBECONFIG=$HOME/.kube/config sudo kubectl get pods -n worker -l app=trip-otobz
          echo "✅ trip-otobz deployed"
