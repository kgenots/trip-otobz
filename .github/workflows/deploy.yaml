name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build image with latest tag
        run: |
          sudo nerdctl --address /run/k3s/containerd/containerd.sock build \
            -t trip-otobz:latest .
          sudo nerdctl --address /run/k3s/containerd/containerd.sock save trip-otobz:latest \
            | sudo k3s ctr images import -

      - name: Rollout restart
        run: |
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout restart deployment/trip-otobz -n worker
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout status deployment/trip-otobz -n worker --timeout=300s

      - name: Verify
        run: |
          KUBECONFIG=$HOME/.kube/config sudo kubectl get pods -n worker -l app=trip-otobz
          echo "✅ trip-otobz deployed"
