name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Fix DNS if needed
        run: |
          if ! nslookup registry-1.docker.io > /dev/null 2>&1; then
            echo "DNS issue detected, adding fallback"
            echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf > /dev/null
            echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf > /dev/null
          fi

      - name: Build image with commit hash tag
        run: |
          mkdir -p $HOME/.docker && echo '{}' > $HOME/.docker/config.json 2>/dev/null || true
          COMMIT_HASH=$(git rev-parse --short HEAD)
          # K3s containerd 에서 빌드 (commit hash 태그 추가)
          sudo nerdctl --address /run/k3s/containerd/containerd.sock build \
            -t trip-otobz:$COMMIT_HASH \
            -t trip-otobz:latest \
            .

      - name: Rollout restart
        run: |
          # 이미지 태그가 변경되었으므로 rollout restart 로 새 이미지 사용
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout restart deployment/trip-otobz -n worker
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout status deployment/trip-otobz -n worker --timeout=120s

      - name: Verify
        run: |
          KUBECONFIG=$HOME/.kube/config sudo kubectl get pods -n worker -l app=trip-otobz
          echo "✅ trip-otobz deployed"
